version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: debtor_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-debtor_db}
      MYSQL_USER: ${MYSQL_USER:-debtor_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-debtor_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - debtor_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: debtor_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - debtor_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: debtor_backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Debtor Query System}
      VERSION: ${VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-debtor_user}:${MYSQL_PASSWORD:-debtor_password}@mysql:3306/${MYSQL_DATABASE:-debtor_db}?charset=utf8mb4
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production-use-strong-random-value}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      SMS_GATEWAY_URL: http://sms-mock:8001
      SMS_GATEWAY_API_KEY: ${SMS_GATEWAY_API_KEY:-mock-sms-api-key}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      CAPTCHA_EXPIRE_SECONDS: ${CAPTCHA_EXPIRE_SECONDS:-300}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      LOCKOUT_DURATION_MINUTES: ${LOCKOUT_DURATION_MINUTES:-15}
      H5_TOKEN_EXPIRE_DAYS: ${H5_TOKEN_EXPIRE_DAYS:-7}
      H5_DAILY_QUERY_LIMIT: ${H5_DAILY_QUERY_LIMIT:-100}
      AES_KEY: ${AES_KEY:-your-32-byte-aes-encryption-key-h}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/sms_providers:/app/sms_providers
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      sms-mock:
        condition: service_started
    networks:
      - debtor_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sms-mock:
    build:
      context: ./backend/sms_mock_server
      dockerfile: Dockerfile
    container_name: debtor_sms_mock
    restart: unless-stopped
    ports:
      - "${SMS_MOCK_PORT:-8001}:8001"
    networks:
      - debtor_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: debtor_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - debtor_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  debtor_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  backend_uploads:
  frontend_dist:
